name: Nois
options:
  bundleIdPrefix: com.nois
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "5"
targets:
  Nois:
    type: application
    platform: iOS
    sources:
      - path: Nois
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"
        PRODUCT_BUNDLE_IDENTIFIER: com.nois.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
    info:
      properties:
        UIBackgroundModes:
          - audio
        UILaunchScreen: {}
        CFBundleDisplayName: Nois
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
