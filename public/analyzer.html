<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nois — Spectrum Analyzer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a1a; color: #e0e0e0; font-family: system-ui, sans-serif; padding: 24px; }
  h1 { font-size: 1.4rem; margin-bottom: 8px; }
  .sub { color: #888; font-size: 0.85rem; margin-bottom: 24px; }
  #drop-zone {
    border: 2px dashed #444; border-radius: 12px; padding: 48px; text-align: center;
    color: #666; font-size: 1.1rem; cursor: pointer; transition: border-color 0.2s;
    margin-bottom: 24px;
  }
  #drop-zone.active { border-color: #7c6ff7; color: #aaa; }
  #drop-zone.loaded { border-color: #4ade80; color: #4ade80; }
  canvas { width: 100%; height: 300px; border-radius: 8px; background: #111; margin-bottom: 16px; }
  #data-output {
    background: #111; border-radius: 8px; padding: 16px; font-family: monospace;
    font-size: 0.8rem; line-height: 1.6; white-space: pre-wrap; max-height: 500px; overflow-y: auto;
  }
  .controls { display: flex; gap: 12px; margin-bottom: 16px; }
  button {
    background: #7c6ff7; color: white; border: none; padding: 8px 16px;
    border-radius: 6px; cursor: pointer; font-size: 0.9rem;
  }
  button:hover { background: #6b5ce7; }
  button:disabled { background: #333; color: #666; cursor: not-allowed; }
</style>
</head>
<body>
<h1>Nois — Spectrum Analyzer</h1>
<p class="sub">Drop an MP3 to extract its spectral profile. Data is used to tune procedural generators.</p>

<div id="drop-zone">Drop MP3 here (or click to browse)</div>
<input type="file" id="file-input" accept="audio/*" style="display:none">

<canvas id="spectrum-canvas"></canvas>

<div class="controls">
  <button id="btn-analyze" disabled>Analyze Full Spectrum</button>
  <button id="btn-play" disabled>Play / Stop</button>
</div>

<div id="data-output">Waiting for audio file...</div>

<script>
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const canvas = document.getElementById('spectrum-canvas');
const ctx2d = canvas.getContext('2d');
const btnAnalyze = document.getElementById('btn-analyze');
const btnPlay = document.getElementById('btn-play');
const dataOutput = document.getElementById('data-output');

let audioCtx = null;
let decodedBuffer = null;
let playSource = null;
let isPlaying = false;

// Drop zone handlers
dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('active'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('active'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('active');
  if (e.dataTransfer.files.length) loadFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => { if (e.target.files.length) loadFile(e.target.files[0]); });

async function loadFile(file) {
  dropZone.textContent = `Loading: ${file.name}...`;
  audioCtx = new AudioContext();
  const arrayBuf = await file.arrayBuffer();
  decodedBuffer = await audioCtx.decodeAudioData(arrayBuf);
  dropZone.textContent = `Loaded: ${file.name} (${decodedBuffer.duration.toFixed(1)}s, ${decodedBuffer.sampleRate}Hz)`;
  dropZone.classList.add('loaded');
  btnAnalyze.disabled = false;
  btnPlay.disabled = false;
}

// Play/stop for reference listening
btnPlay.addEventListener('click', () => {
  if (isPlaying && playSource) {
    playSource.stop();
    isPlaying = false;
    btnPlay.textContent = 'Play / Stop';
    return;
  }
  playSource = audioCtx.createBufferSource();
  playSource.buffer = decodedBuffer;
  playSource.connect(audioCtx.destination);
  playSource.start();
  isPlaying = true;
  btnPlay.textContent = 'Stop';
  playSource.onended = () => { isPlaying = false; btnPlay.textContent = 'Play / Stop'; };
});

// Full spectrum analysis
btnAnalyze.addEventListener('click', () => {
  analyzeSpectrum();
});

function analyzeSpectrum() {
  const sampleRate = decodedBuffer.sampleRate;
  const channelData = decodedBuffer.getChannelData(0);
  const fftSize = 4096;
  const numBins = fftSize / 2;
  const hzPerBin = sampleRate / fftSize;

  // Take multiple windows and average
  const numWindows = Math.min(50, Math.floor(channelData.length / fftSize));
  const avgMagnitudes = new Float64Array(numBins);

  for (let w = 0; w < numWindows; w++) {
    // Pick evenly spaced windows
    const offset = Math.floor((w / numWindows) * (channelData.length - fftSize));
    const windowData = new Float64Array(fftSize);

    // Apply Hann window
    for (let i = 0; i < fftSize; i++) {
      const hann = 0.5 * (1 - Math.cos(2 * Math.PI * i / fftSize));
      windowData[i] = channelData[offset + i] * hann;
    }

    // Manual DFT for key frequency bands (full FFT is too slow in plain JS)
    // Instead, use the built-in AnalyserNode approach via OfflineAudioContext
    const real = fft(windowData);
    for (let i = 0; i < numBins; i++) {
      avgMagnitudes[i] += real[i] / numWindows;
    }
  }

  // Group into perceptual bands
  const bands = [
    { label: 'Sub-bass', min: 20, max: 60 },
    { label: 'Bass', min: 60, max: 200 },
    { label: 'Low-mid', min: 200, max: 500 },
    { label: 'Mid', min: 500, max: 1000 },
    { label: 'Upper-mid', min: 1000, max: 2000 },
    { label: 'Presence', min: 2000, max: 4000 },
    { label: 'Brilliance', min: 4000, max: 8000 },
    { label: 'Air', min: 8000, max: 16000 },
  ];

  const bandEnergy = bands.map(b => {
    const startBin = Math.max(1, Math.floor(b.min / hzPerBin));
    const endBin = Math.min(numBins - 1, Math.floor(b.max / hzPerBin));
    let sum = 0;
    let count = 0;
    for (let i = startBin; i <= endBin; i++) {
      sum += avgMagnitudes[i];
      count++;
    }
    return { ...b, energy: sum / count, sumEnergy: sum };
  });

  // Find peak frequency
  let peakBin = 0;
  let peakVal = 0;
  for (let i = 1; i < numBins; i++) {
    if (avgMagnitudes[i] > peakVal) { peakVal = avgMagnitudes[i]; peakBin = i; }
  }

  // Normalize to max band
  const maxEnergy = Math.max(...bandEnergy.map(b => b.energy));

  // Draw spectrum
  drawSpectrum(avgMagnitudes, numBins, hzPerBin, bandEnergy);

  // Output data
  let output = `=== SPECTRAL ANALYSIS ===\n`;
  output += `Sample rate: ${sampleRate} Hz | FFT size: ${fftSize} | Windows averaged: ${numWindows}\n`;
  output += `Peak frequency: ${(peakBin * hzPerBin).toFixed(0)} Hz\n\n`;

  output += `=== BAND ENERGY (normalized to strongest band) ===\n`;
  for (const b of bandEnergy) {
    const norm = (b.energy / maxEnergy * 100).toFixed(1);
    const db = (20 * Math.log10(b.energy / maxEnergy)).toFixed(1);
    const bar = '█'.repeat(Math.round(norm / 2));
    output += `${b.label.padEnd(12)} ${b.min.toString().padStart(5)}-${b.max.toString().padEnd(5)} Hz: ${norm.padStart(5)}% (${db.padStart(6)} dB) ${bar}\n`;
  }

  output += `\n=== FILTER SUGGESTIONS FOR CROWD-MURMUR ===\n`;

  // Find dominant bands
  const sorted = [...bandEnergy].sort((a, b) => b.energy - a.energy);
  output += `\nDominant bands (strongest first):\n`;
  for (const b of sorted) {
    const norm = (b.energy / maxEnergy * 100).toFixed(1);
    output += `  ${b.label} (${b.min}-${b.max} Hz): ${norm}%\n`;
  }

  // Suggest filter config
  output += `\n--- Suggested biquad filter config ---\n`;
  const top3 = sorted.slice(0, 4);
  for (const b of top3) {
    const centerFreq = Math.round(Math.sqrt(b.min * b.max));
    const relGain = (b.energy / maxEnergy).toFixed(3);
    output += `  bandpass: freq=${centerFreq} Hz, gain~${relGain} (relative)\n`;
  }

  output += `\n--- Raw top 20 frequency peaks ---\n`;
  const peaks = [];
  for (let i = 2; i < numBins - 2; i++) {
    if (avgMagnitudes[i] > avgMagnitudes[i-1] && avgMagnitudes[i] > avgMagnitudes[i+1]
        && avgMagnitudes[i] > avgMagnitudes[i-2] && avgMagnitudes[i] > avgMagnitudes[i+2]) {
      peaks.push({ freq: i * hzPerBin, mag: avgMagnitudes[i] });
    }
  }
  peaks.sort((a, b) => b.mag - a.mag);
  for (const p of peaks.slice(0, 20)) {
    const db = (20 * Math.log10(p.mag / peakVal)).toFixed(1);
    output += `  ${p.freq.toFixed(0).padStart(6)} Hz: ${db.padStart(6)} dB\n`;
  }

  dataOutput.textContent = output;
}

// Simple radix-2 FFT (magnitude only)
function fft(input) {
  const N = input.length;
  const magnitudes = new Float64Array(N / 2);

  // Bit reversal
  const re = new Float64Array(N);
  const im = new Float64Array(N);
  const bits = Math.log2(N);

  for (let i = 0; i < N; i++) {
    let rev = 0;
    for (let b = 0; b < bits; b++) {
      rev = (rev << 1) | ((i >> b) & 1);
    }
    re[rev] = input[i];
  }

  // Cooley-Tukey
  for (let size = 2; size <= N; size *= 2) {
    const half = size / 2;
    const angle = -2 * Math.PI / size;
    for (let i = 0; i < N; i += size) {
      for (let j = 0; j < half; j++) {
        const cos = Math.cos(angle * j);
        const sin = Math.sin(angle * j);
        const tRe = re[i + j + half] * cos - im[i + j + half] * sin;
        const tIm = re[i + j + half] * sin + im[i + j + half] * cos;
        re[i + j + half] = re[i + j] - tRe;
        im[i + j + half] = im[i + j] - tIm;
        re[i + j] += tRe;
        im[i + j] += tIm;
      }
    }
  }

  for (let i = 0; i < N / 2; i++) {
    magnitudes[i] = Math.sqrt(re[i] * re[i] + im[i] * im[i]);
  }
  return magnitudes;
}

function drawSpectrum(magnitudes, numBins, hzPerBin, bandEnergy) {
  const dpr = window.devicePixelRatio || 1;
  canvas.width = canvas.clientWidth * dpr;
  canvas.height = canvas.clientHeight * dpr;
  ctx2d.scale(dpr, dpr);
  const W = canvas.clientWidth;
  const H = canvas.clientHeight;

  ctx2d.fillStyle = '#111';
  ctx2d.fillRect(0, 0, W, H);

  // Log scale for frequency axis
  const minFreq = 20;
  const maxFreq = 16000;
  const logMin = Math.log10(minFreq);
  const logMax = Math.log10(maxFreq);

  // Find max magnitude for normalization
  let maxMag = 0;
  for (let i = 1; i < numBins; i++) {
    if (magnitudes[i] > maxMag) maxMag = magnitudes[i];
  }

  // Draw band backgrounds
  const bandColors = ['#1a1a2e', '#16213e', '#1a1a2e', '#16213e', '#1a1a2e', '#16213e', '#1a1a2e', '#16213e'];
  for (let b = 0; b < bandEnergy.length; b++) {
    const x1 = ((Math.log10(bandEnergy[b].min) - logMin) / (logMax - logMin)) * W;
    const x2 = ((Math.log10(bandEnergy[b].max) - logMin) / (logMax - logMin)) * W;
    ctx2d.fillStyle = bandColors[b];
    ctx2d.fillRect(x1, 0, x2 - x1, H);

    // Band label
    ctx2d.fillStyle = '#444';
    ctx2d.font = '10px system-ui';
    ctx2d.textAlign = 'center';
    ctx2d.fillText(bandEnergy[b].label, (x1 + x2) / 2, H - 4);
  }

  // Draw frequency grid
  ctx2d.strokeStyle = '#333';
  ctx2d.lineWidth = 0.5;
  for (const f of [50, 100, 200, 500, 1000, 2000, 5000, 10000]) {
    const x = ((Math.log10(f) - logMin) / (logMax - logMin)) * W;
    ctx2d.beginPath(); ctx2d.moveTo(x, 0); ctx2d.lineTo(x, H - 16); ctx2d.stroke();
    ctx2d.fillStyle = '#555';
    ctx2d.font = '9px monospace';
    ctx2d.textAlign = 'center';
    ctx2d.fillText(f >= 1000 ? `${f/1000}k` : `${f}`, x, H - 18);
  }

  // Draw spectrum line
  ctx2d.beginPath();
  ctx2d.strokeStyle = '#7c6ff7';
  ctx2d.lineWidth = 1.5;
  let first = true;
  for (let i = 1; i < numBins; i++) {
    const freq = i * hzPerBin;
    if (freq < minFreq || freq > maxFreq) continue;
    const x = ((Math.log10(freq) - logMin) / (logMax - logMin)) * W;
    const dB = 20 * Math.log10(magnitudes[i] / maxMag + 0.0001);
    const y = H - 20 - ((dB + 60) / 60) * (H - 30); // -60dB to 0dB range
    if (first) { ctx2d.moveTo(x, Math.max(0, y)); first = false; }
    else ctx2d.lineTo(x, Math.max(0, y));
  }
  ctx2d.stroke();

  // Fill under curve
  ctx2d.lineTo(W, H - 20);
  ctx2d.lineTo(0, H - 20);
  ctx2d.closePath();
  ctx2d.fillStyle = 'rgba(124, 111, 247, 0.15)';
  ctx2d.fill();
}
</script>
</body>
</html>
